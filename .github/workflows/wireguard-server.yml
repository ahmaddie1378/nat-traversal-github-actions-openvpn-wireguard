name: Reverse TCP Tunnel (bash)

on:
  workflow_dispatch:
    inputs:
      public_ip:
        description: 'Your public IP address'
        required: true
        type: string
      port:
        description: 'TCP port on your machine (e.g., 25555)'
        required: true
        type: string

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Connect back to user via bash TCP
        run: |
          echo "Connecting to ${{ inputs.public_ip }}:${{ inputs.port }}"
          while true; do
            # Create a 2-way pipe: runner -> your machine
            # We'll forward local SSH (port 22) back through the tunnel
            bash -c "
              exec 3<>/dev/tcp/${{ inputs.public_ip }}/${{ inputs.port }}
              cat <&3 &
              cat >&3
            " || sleep 5
          done &
          sleep 21000
