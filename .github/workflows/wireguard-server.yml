name: NAT Traversal VPN

on:
  workflow_dispatch:
    inputs:
      vpn_type:
        required: true
        type: choice
        options: [openvpn]
      public_ip:
        required: true
        type: string
      local_port:
        required: true
        type: string
      static_key_b64:
        description: 'Base64 encoded static.key file (run: cat static.key | base64 -w0)'
        required: true
        type: string

jobs:
  openvpn-connect:
    if: ${{ github.event.inputs.vpn_type == 'openvpn' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install OpenVPN
        run: sudo apt update && sudo apt install -y openvpn
      - name: Decode key and connect
        run: |
          echo "${{ github.event.inputs.static_key_b64 }}" | base64 -d > static.key
          sudo chmod 600 static.key
          cat > client.ovpn << EOF
          remote ${{ github.event.inputs.public_ip }} ${{ github.event.inputs.local_port }}
          dev tun
          proto udp
          secret static.key
          cipher AES-256-CBC
          verb 3
          EOF
          sudo openvpn --config client.ovpn --allow-deprecated-insecure-static-crypto &
          sleep 5
          sleep 21000
