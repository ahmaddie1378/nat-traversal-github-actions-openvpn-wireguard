name: NAT Traversal VPN

on:
  workflow_dispatch:
    inputs:
      vpn_type:
        required: true
        type: choice
        options: [openvpn, wireguard]
      public_ip:
        required: true
        type: string
      local_port:
        required: true
        type: string

jobs:
  openvpn-connect:
    if: ${{ github.event.inputs.vpn_type == 'openvpn' }}
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt update && sudo apt install -y openvpn
      - run: |
          echo "${{ secrets.OVPN_STATIC_KEY }}" > static.key
          sudo chmod 600 static.key
          cat > client.ovpn << EOF
          remote ${{ github.event.inputs.public_ip }} ${{ github.event.inputs.local_port }}
          dev tun
          proto udp
          secret static.key
          cipher AES-256-CBC
          verb 3
          EOF
          sudo openvpn --config client.ovpn &
          sleep 5
          sleep 21000
