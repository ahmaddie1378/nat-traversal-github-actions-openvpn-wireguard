name: Download Blocked File (Base64)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the file to download'
        required: true
        type: string
      filename:
        description: 'Optional: save as this filename (used for decoder hint)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download file
        run: |
          URL="${{ github.event.inputs.url }}"
          if [ -n "${{ github.event.inputs.filename }}" ]; then
            FILENAME="${{ github.event.inputs.filename }}"
          else
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
          fi
          wget -O "$FILENAME" "$URL"
          echo "TARGET_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Output base64
        run: |
          echo "===== BASE64 OF $TARGET_FILENAME ====="
          base64 -w0 "$TARGET_FILENAME"
          echo ""
          echo "===== END BASE64 ====="
          echo "Copy the base64 block above (between the markers) and decode it locally with:"
          echo "  base64 -d < copied_text > $TARGET_FILENAME"
