name: Save Full Offline Webpage (SingleFile)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the page to archive'
        required: true
      filename:
        description: 'Filename without .html (optional)'
        required: false
      wait_seconds:
        description: 'Extra wait after page load (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SingleFile CLI and Puppeteer
        run: |
          npm init -y
          # SingleFile CLI plus the stealth plugin for Puppeteer
          npm install single-file-cli puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Start FlareSolverr via Docker
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        env:
          URL: ${{ inputs.url }}
        run: |
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          python3 << 'EOF'
          import json
          with open('response.json') as f:
              data = json.load(f)
          cookies = data.get('solution', {}).get('cookies') or data.get('cookies')
          valid = 0
          with open('cookies.txt', 'w') as out:
              if cookies:
                  for c in cookies:
                      if not isinstance(c, dict): continue
                      domain = c.get('domain','')
                      httpOnly = 'TRUE' if c.get('httpOnly') else 'FALSE'
                      path = c.get('path','/')
                      secure = 'TRUE' if c.get('secure') else 'FALSE'
                      expires = c.get('expiry',0) or 0
                      name = c.get('name','')
                      value = c.get('value','')
                      out.write(f"{domain}\t{httpOnly}\t{path}\t{secure}\t{expires}\t{name}\t{value}\n")
                      valid += 1
          print(f"FlareSolverr cookies: {valid}")
          EOF

      - name: Save offline page with SingleFile
        env:
          URL: ${{ inputs.url }}
          FILENAME_INPUT: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
        run: |
          mkdir -p downloads
          if [ -n "$FILENAME_INPUT" ]; then
            BASE="$FILENAME_INPUT"
          else
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            BASE="${DOMAIN}_$(date +%Y%m%d_%H%M%S)"
          fi
          echo "Output filename: $BASE.html"

          # Convert Netscape cookies to JSON array for SingleFile CLI
          python3 << 'PYEOF'
          import json

          cookies_list = []
          with open('cookies.txt') as f:
              for line in f:
                  if line.strip() == '' or line.startswith('#'): continue
                  parts = line.strip().split('\t')
                  if len(parts) >= 7:
                      domain, _, path, secure, expires, name, value = parts[:7]
                      cookies_list.append({
                          "name": name,
                          "value": value,
                          "domain": domain,
                          "path": path,
                          "secure": secure == "TRUE",
                          "httpOnly": False,
                          "expiry": int(expires) if expires != '0' else None
                      })
          with open('cookies.json', 'w') as out:
              json.dump(cookies_list, out)
          print(f"Converted {len(cookies_list)} cookies to JSON")
          PYEOF

          # Run SingleFile CLI with stealth user-agent and the Cloudflare cookies
          npx single-file --browser-executable-path=$(which google-chrome || which chromium || echo "") \
            --browser-args='["--no-sandbox","--disable-setuid-sandbox","--disable-blink-features=AutomationControlled"]' \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --cookies-file="cookies.json" \
            --delay-after-load="$WAIT_SECONDS" \
            --output="downloads/$BASE.html" \
            "$URL"

          # Verify
          if [ -f "downloads/$BASE.html" ]; then
            echo "Offline HTML created successfully."
          else
            echo "ERROR: SingleFile did not produce an output."
            ls -la downloads/
            exit 1
          fi

          echo "base_name=$BASE" >> $GITHUB_ENV

      - name: Package into zip
        run: |
          cd downloads
          zip -r "../${{ env.base_name }}.zip" "${{ env.base_name }}.html"
          echo "zip_file=${{ env.base_name }}.zip" >> $GITHUB_ENV
          cd ..

      - name: Commit zip to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.zip_file }}"
          git commit -m "Archived offline page ${{ inputs.url }}" || echo "No changes"
          git push
