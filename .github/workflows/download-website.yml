name: Download Website (Headless Browser)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        type: string
      filename:
        description: 'Zip filename without .zip (optional, leave empty for domain name)'
        required: false
      wait_seconds:
        description: 'Extra wait after page load (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer & stealth plugin
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Start FlareSolverr via Docker
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        id: solve
        env:
          URL: ${{ inputs.url }}
        run: |
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          python3 << 'EOF'
          import json, sys
          with open('response.json') as f:
              data = json.load(f)
          cookies = None
          if 'solution' in data and 'cookies' in data['solution']:
              cookies = data['solution']['cookies']
          elif 'cookies' in data:
              cookies = data['cookies']
          valid = 0
          with open('cookies.txt', 'w') as out:
              if cookies:
                  for c in cookies:
                      if not isinstance(c, dict): continue
                      out.write(f"{c.get('domain','')}\t{'TRUE' if c.get('httpOnly') else 'FALSE'}\t{c.get('path','/')}\t{'TRUE' if c.get('secure') else 'FALSE'}\t{c.get('expiry',0) or 0}\t{c.get('name','')}\t{c.get('value','')}\n")
                      valid += 1
          print(f"Wrote {valid} cookies")
          final_url = ''
          if 'solution' in data and 'response' in data['solution']:
              resp = data['solution']['response']
              final_url = resp.get('url','') if isinstance(resp, dict) else ''
          elif 'solution' in data and 'url' in data['solution']:
              final_url = data['solution']['url']
          with open('final_url.txt','w') as f: f.write(final_url)
          EOF

      - name: Save complete page as MHTML
        env:
          URL: ${{ inputs.url }}
          FILENAME_INPUT: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
        run: |
          mkdir -p downloads

          # Determine output filename base
          if [ -n "$FILENAME_INPUT" ]; then
            BASE="$FILENAME_INPUT"
          else
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            BASE="${DOMAIN}_$(date +%Y%m%d_%H%M%S)"
          fi

          export BASE                    # <-- make it visible to Node
          echo "Output base name: $BASE"

          node -e "
            const puppeteer = require('puppeteer-extra');
            const StealthPlugin = require('puppeteer-extra-plugin-stealth');
            puppeteer.use(StealthPlugin());
            const fs = require('fs');
            const wait = ms => new Promise(r => setTimeout(r, ms));

            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            const waitSeconds = parseInt(process.env.WAIT_SECONDS) || 30;
            const base = process.env.BASE;

            if (!base) {
              console.error('BASE environment variable is missing!');
              process.exit(1);
            }

            const cookiesRaw = fs.readFileSync('cookies.txt', 'utf-8').split('\n');
            const cookies = [];
            for (const line of cookiesRaw) {
              if (line.trim() === '' || line.startsWith('#')) continue;
              const parts = line.split('\t');
              if (parts.length >= 7) {
                const [domain, , path, secure, expires, name, value] = parts;
                cookies.push({
                  domain: domain.trim(),
                  path: path.trim(),
                  secure: secure.trim().toUpperCase() === 'TRUE',
                  expires: parseInt(expires) || undefined,
                  name: name.trim(),
                  value: value.trim()
                });
              }
            }

            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-blink-features=AutomationControlled']
              });
              const page = await browser.newPage();
              await page.setUserAgent(userAgent);
              await page.setViewport({ width: 1366, height: 768 });

              if (cookies.length > 0) {
                await page.setCookie(...cookies);
                console.log('Injected ' + cookies.length + ' cookies');
              }

              try {
                await page.goto(process.env.URL, {
                  waitUntil: 'networkidle2',
                  timeout: 120000
                });
                console.log('Page loaded. Waiting ' + waitSeconds + ' seconds...');
                await wait(waitSeconds * 1000);
              } catch (err) {
                console.log('Error or timeout:', err.message);
                await wait(Math.max(waitSeconds * 500, 5000));
              }

              // Save as MHTML
              const cdp = await page.target().createCDPSession();
              const { data } = await cdp.send('Page.captureSnapshot', { format: 'mhtml' });
              fs.writeFileSync('downloads/' + base + '.mhtml', data);
              console.log('MHTML saved: downloads/' + base + '.mhtml');
              await browser.close();
            })();
          "

          # Verify the file
          if [ -f "downloads/$BASE.mhtml" ]; then
            echo "MHTML file exists."
          else
            echo "ERROR: MHTML file was not created!"
            ls -la downloads/
            exit 1
          fi

          echo "base_name=$BASE" >> $GITHUB_ENV

      - name: Package MHTML into zip
        run: |
          cd downloads
          zip -r "../${{ env.base_name }}.zip" "${{ env.base_name }}.mhtml"
          echo "zip_file=${{ env.base_name }}.zip" >> $GITHUB_ENV
          cd ..

      - name: Commit zip to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.zip_file }}"
          git commit -m "Archived ${{ inputs.url }}" || echo "No changes"
          git push
