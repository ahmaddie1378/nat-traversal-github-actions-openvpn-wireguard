name: Save Full Offline Website (assets)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to save'
        required: true
      filename:
        description: 'Base name for the zip (optional)'
        required: false
      wait_seconds:
        description: 'Extra wait after load (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  download-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
          npm install website-scraper website-scraper-puppeteer

      - name: Start FlareSolverr (Docker)
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        env:
          URL: ${{ inputs.url }}
        run: |
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          python3 << 'EOF'
          import json
          with open('response.json') as f:
              data = json.load(f)
          cookies = data.get('solution', {}).get('cookies') or data.get('cookies')
          with open('cookies.txt', 'w') as out:
              if cookies:
                  for c in cookies:
                      if not isinstance(c, dict): continue
                      domain = c.get('domain','')
                      httpOnly = 'TRUE' if c.get('httpOnly') else 'FALSE'
                      path = c.get('path','/')
                      secure = 'TRUE' if c.get('secure') else 'FALSE'
                      expires = c.get('expiry',0) or 0
                      name = c.get('name','')
                      value = c.get('value','')
                      out.write(f"{domain}\t{httpOnly}\t{path}\t{secure}\t{expires}\t{name}\t{value}\n")
          print("Cookies exported")
          EOF

      - name: Scrape website (offline copy)
        env:
          URL: ${{ inputs.url }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
          FILENAME_INPUT: ${{ inputs.filename }}
        run: |
          mkdir -p downloads
          if [ -n "$FILENAME_INPUT" ]; then
            BASE="$FILENAME_INPUT"
          else
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            BASE="${DOMAIN}_$(date +%Y%m%d_%H%M%S)"
          fi
          export BASE
          echo "Output folder: downloads/$BASE"

          node -e "
          const scrape = require('website-scraper');
          const PuppeteerPlugin = require('website-scraper-puppeteer');
          const fs = require('fs');

          // Parse cookies from Netscape file
          function parseCookies(file) {
            const lines = fs.readFileSync(file, 'utf-8').split('\n');
            const cookies = [];
            for (let line of lines) {
              line = line.trim();
              if (line === '' || line.startsWith('#')) continue;
              const parts = line.split('\t');
              if (parts.length >= 7) {
                cookies.push({
                  name: parts[5],
                  value: parts[6],
                  domain: parts[0].replace(/^\./, ''),
                  path: parts[2],
                  secure: parts[3] === 'TRUE',
                  httpOnly: parts[1] === 'TRUE'
                });
              }
            }
            return cookies;
          }

          const cookies = parseCookies('cookies.txt');
          const url = process.env.URL;
          const baseDir = 'downloads/' + process.env.BASE;

          const options = {
            urls: [url],
            directory: baseDir,
            recursive: false,
            sources: [
              { selector: 'img', attr: 'src' },
              { selector: 'link[rel=\"stylesheet\"]', attr: 'href' },
              { selector: 'script', attr: 'src' },
              { selector: 'source', attr: 'src' },
              { selector: 'video', attr: 'src' }
            ],
            subdirectories: [
              { directory: 'img', extensions: ['.jpg','.jpeg','.png','.gif','.svg','.webp'] },
              { directory: 'css', extensions: ['.css'] },
              { directory: 'js', extensions: ['.js'] },
              { directory: 'fonts', extensions: ['.woff','.woff2','.ttf','.eot'] },
              { directory: 'other' }
            ],
            request: {
              headers: {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              }
            },
            plugins: [
              new PuppeteerPlugin({
                launchOptions: {
                  headless: 'new',
                  args: ['--no-sandbox', '--disable-setuid-sandbox']
                },
                // Inject cookies before page load
                beforePageLoad: async (page) => {
                  if (cookies.length > 0) {
                    await page.setCookie(...cookies);
                  }
                }
              })
            ]
          };

          scrape(options).then(() => {
            console.log('Website saved to ' + baseDir);
          }).catch((err) => {
            console.error('Scraping error:', err);
            process.exit(1);
          });
          "

          # Check that index.html exists
          if [ ! -f "downloads/$BASE/index.html" ]; then
            echo "ERROR: index.html not found! Contents of downloads/$BASE:"
            ls -la downloads/$BASE || echo "(folder missing)"
            exit 1
          fi
          echo "base_name=$BASE" >> $GITHUB_ENV

      - name: Package into zip
        run: |
          cd downloads
          zip -r "../${{ env.base_name }}.zip" "${{ env.base_name }}"
          echo "zip_file=${{ env.base_name }}.zip" >> $GITHUB_ENV
          cd ..

      - name: Commit zip to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.zip_file }}"
          git commit -m "Saved offline site ${{ inputs.url }}" || echo "No changes"
          git push
