name: Download Website as Zip

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (e.g., https://example.com)'
        required: true
        type: string
      depth:
        description: 'Recursion depth (default 2, increase for more pages)'
        required: false
        default: '2'
      wait:
        description: 'Wait between requests in seconds (avoid rate limits)'
        required: false
        default: '1'
      filename:
        description: 'Zip filename without .zip (optional, leave empty for domain name)'
        required: false

permissions:
  contents: write   # allow pushing zip to repo

jobs:
  download-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download website with wget
        env:
          URL: ${{ inputs.url }}
          DEPTH: ${{ inputs.depth }}
          WAIT: ${{ inputs.wait }}
        run: |
          # Determine output directory name from domain
          DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
          OUTPUT_DIR="downloads/$DOMAIN"
          mkdir -p "$OUTPUT_DIR"

          wget \
            --recursive \
            --level=$DEPTH \
            --wait=$WAIT \
            --no-parent \
            --adjust-extension \
            --convert-links \
            --restrict-file-names=windows \
            --no-host-directories \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --directory-prefix="$OUTPUT_DIR" \
            "$URL" || echo "Download completed with some errors (may be fine)"

      - name: Package into zip file
        env:
          FILENAME_INPUT: ${{ inputs.filename }}
        run: |
          DOMAIN=$(echo "${{ inputs.url }}" | awk -F/ '{print $3}')
          OUTPUT_DIR="downloads/$DOMAIN"
          if [ -n "$FILENAME_INPUT" ]; then
            ZIPFILE="downloads/${FILENAME_INPUT}.zip"
          else
            ZIPFILE="downloads/${DOMAIN}_$(date +%Y%m%d_%H%M%S).zip"
          fi

          # Create zip (install zip if not present)
          sudo apt update && sudo apt install -y zip
          cd "$OUTPUT_DIR"
          zip -r "../../$ZIPFILE" .
          echo "zip_file=$ZIPFILE" >> $GITHUB_ENV

      - name: Commit zip to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.zip_file }}"
          git commit -m "Downloaded website ${{ inputs.url }} as zip" || echo "No changes to commit"
          git push
