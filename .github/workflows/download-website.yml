name: Save Full Offline Website (Pure Puppeteer)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to save'
        required: true
      filename:
        description: 'Base name for the zip (optional)'
        required: false
      wait_seconds:
        description: 'Extra wait after load (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  download-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer & stealth
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Start FlareSolverr via Docker
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        env:
          URL: ${{ inputs.url }}
        run: |
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          python3 << 'EOF'
          import json
          with open('response.json') as f:
              data = json.load(f)
          cookies = data.get('solution', {}).get('cookies') or data.get('cookies')
          with open('cookies.txt', 'w') as out:
              if cookies:
                  for c in cookies:
                      if not isinstance(c, dict): continue
                      domain = c.get('domain','')
                      httpOnly = 'TRUE' if c.get('httpOnly') else 'FALSE'
                      path = c.get('path','/')
                      secure = 'TRUE' if c.get('secure') else 'FALSE'
                      expires = c.get('expiry',0) or 0
                      name = c.get('name','')
                      value = c.get('value','')
                      out.write(f"{domain}\t{httpOnly}\t{path}\t{secure}\t{expires}\t{name}\t{value}\n")
          print("Cookies exported")
          EOF

      - name: Write offline capture script
        run: |
          cat > offline-capture.js << 'ENDOFSCRIPT'
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const wait = ms => new Promise(r => setTimeout(r, ms));

          const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
          const waitSeconds = parseInt(process.env.WAIT_SECONDS) || 30;
          const baseDir = 'downloads/' + process.env.BASE;

          function parseCookies(file) {
            const lines = fs.readFileSync(file, 'utf-8').split('\n');
            const arr = [];
            for (let line of lines) {
              line = line.trim();
              if (line === '' || line.startsWith('#')) continue;
              const parts = line.split('\t');
              if (parts.length >= 7) {
                arr.push({
                  name: parts[5],
                  value: parts[6],
                  domain: parts[0].replace(/^\./, ''),
                  path: parts[2],
                  secure: parts[3] === 'TRUE',
                  httpOnly: parts[1] === 'TRUE'
                });
              }
            }
            return arr;
          }

          function getExtension(url, contentType) {
            if (contentType) {
              const mimeMap = {
                'image/jpeg': '.jpg',
                'image/png': '.png',
                'image/gif': '.gif',
                'image/svg+xml': '.svg',
                'image/webp': '.webp',
                'text/css': '.css',
                'application/javascript': '.js',
                'application/x-javascript': '.js',
                'text/javascript': '.js',
              };
              for (const [mime, ext] of Object.entries(mimeMap)) {
                if (contentType.includes(mime)) return ext;
              }
            }
            const pathname = new URL(url).pathname;
            return path.extname(pathname) || '.dat';
          }

          (async () => {
            const cookies = parseCookies('cookies.txt');
            const urlMap = {};

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-blink-features=AutomationControlled']
            });
            const page = await browser.newPage();
            await page.setUserAgent(userAgent);
            await page.setViewport({ width: 1366, height: 768 });

            if (cookies.length > 0) {
              await page.setCookie(...cookies);
            }

            await page.setRequestInterception(true);
            page.on('request', async (request) => {
              const url = request.url();
              const resourceType = request.resourceType();

              if (['image', 'stylesheet', 'script', 'font'].includes(resourceType)) {
                try {
                  const response = await fetch(url);
                  if (response.ok) {
                    const buffer = await response.arrayBuffer();
                    const contentType = response.headers.get('content-type') || '';
                    const ext = getExtension(url, contentType);
                    const hash = crypto.createHash('md5').update(url).digest('hex').substring(0, 8);
                    const localFilename = hash + ext;
                    const localPath = path.join(baseDir, localFilename);
                    fs.writeFileSync(localPath, Buffer.from(buffer));
                    urlMap[url] = localFilename;
                  }
                } catch (e) {
                  // ignore, let request continue
                }
              }
              request.continue();
            });

            try {
              await page.goto(process.env.URL, { waitUntil: 'networkidle2', timeout: 120000 });
            } catch (err) {
              console.log('Navigation warning:', err.message);
            }
            await wait(waitSeconds * 1000);

            let html = await page.content();

            // Replace resource URLs with local filenames
            for (const [originalUrl, localFile] of Object.entries(urlMap)) {
              const escaped = originalUrl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              html = html.replace(new RegExp(escaped, 'g'), localFile);
            }

            fs.writeFileSync(path.join(baseDir, 'index.html'), html);
            console.log('Saved offline page to ' + baseDir);
            await browser.close();
          })();
          ENDOFSCRIPT

      - name: Run offline capture
        env:
          URL: ${{ inputs.url }}
          FILENAME_INPUT: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
          BASE: ${{ inputs.filename || format('{0}_{1}', inputs.url | replace('https://','') | replace('/','_') | truncate(50), github.run_id) }}  # fallback, but we'll compute properly inside script
        run: |
          mkdir -p downloads
          if [ -n "$FILENAME_INPUT" ]; then
            BASE="$FILENAME_INPUT"
          else
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            BASE="${DOMAIN}_$(date +%Y%m%d_%H%M%S)"
          fi
          export BASE
          mkdir -p "downloads/$BASE"
          node offline-capture.js

          if [ ! -f "downloads/$BASE/index.html" ]; then
            echo "ERROR: index.html not created"
            ls -la "downloads/$BASE" || echo "folder missing"
            exit 1
          fi
          echo "base_name=$BASE" >> $GITHUB_ENV

      - name: Package into zip
        run: |
          cd downloads
          zip -r "../${{ env.base_name }}.zip" "${{ env.base_name }}"
          echo "zip_file=${{ env.base_name }}.zip" >> $GITHUB_ENV
          cd ..

      - name: Commit zip to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.zip_file }}"
          git commit -m "Saved offline site ${{ inputs.url }}" || echo "No changes"
          git push
