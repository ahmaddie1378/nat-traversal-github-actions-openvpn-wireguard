name: Show My Public IP

on:
  workflow_dispatch:

jobs:
  show-ip:
    runs-on: ubuntu-latest
    steps:
      - name: Get public IP
        run: |
          echo "Runner's public IPv4:"
          curl -s https://ifconfig.me
          echo ""
          echo "---"
          echo "IPv4 from another service:"
          curl -s https://ipinfo.io/ip
          echo ""
          echo "---"
          echo "Full IP info (JSON):"
          curl -s https://ipinfo.io/json
