name: Screenshot with Cloudflare Bypass (Docker)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to capture'
        required: true
      filename:
        description: 'Screenshot filename (without .png) – optional'
        required: false
      wait_seconds:
        description: 'Extra wait after solving Cloudflare (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  bypass-and-screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer & stealth plugin
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Start FlareSolverr via Docker
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 30); do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        id: solve
        env:
          URL: ${{ inputs.url }}
        run: |
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          python3 << 'EOF'
          import json, sys

          with open('response.json') as f:
              data = json.load(f)

          # Extract cookies (same as before)
          cookies = None
          if 'solution' in data and 'cookies' in data['solution']:
              cookies = data['solution']['cookies']
          elif 'cookies' in data:
              cookies = data['cookies']

          if cookies:
              valid_cookies = 0
              with open('cookies.txt', 'w') as out:
                  for c in cookies:
                      if not isinstance(c, dict):
                          continue
                      domain = c.get('domain', '')
                      httpOnly = 'TRUE' if c.get('httpOnly') else 'FALSE'
                      path = c.get('path', '/')
                      secure = 'TRUE' if c.get('secure') else 'FALSE'
                      expires = c.get('expiry', 0) or 0
                      name = c.get('name', '')
                      value = c.get('value', '')
                      out.write(f"{domain}\t{httpOnly}\t{path}\t{secure}\t{expires}\t{name}\t{value}\n")
                      valid_cookies += 1
              print(f"Wrote {valid_cookies} valid cookies to cookies.txt")
          else:
              print("No cookies found")
              with open('cookies.txt', 'w') as f:
                  f.write('')

          # Extract final URL (handle both object and string responses)
          final_url = ''
          if 'solution' in data and 'response' in data['solution']:
              resp = data['solution']['response']
              if isinstance(resp, dict):
                  final_url = resp.get('url', '')
              elif isinstance(resp, str):
                  # Response is the page HTML, no separate URL; leave empty or use original URL
                  final_url = ''
          elif 'solution' in data and 'url' in data['solution']:
              final_url = data['solution']['url']
          else:
              final_url = ''

          with open('final_url.txt', 'w') as f:
              f.write(final_url)
          print(f"Final URL: {final_url if final_url else 'none'}")
          EOF

          echo "final_url=$(cat final_url.txt)" >> $GITHUB_OUTPUT

      - name: Take screenshot using solved cookies
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
        run: |
          mkdir -p screenshots
          if [ -n "$FILENAME" ]; then
            FNAME="$FILENAME.png"
          else
            FNAME="screenshot_$(date +%Y%m%d_%H%M%S).png"
          fi

          node -e "
            const puppeteer = require('puppeteer-extra');
            const StealthPlugin = require('puppeteer-extra-plugin-stealth');
            puppeteer.use(StealthPlugin());
            const fs = require('fs');
            const wait = ms => new Promise(r => setTimeout(r, ms));

            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            const waitSeconds = parseInt(process.env.WAIT_SECONDS) || 30;

            const cookiesRaw = fs.readFileSync('cookies.txt', 'utf-8').split('\n');
            const cookies = [];
            for (const line of cookiesRaw) {
              if (line.trim() === '' || line.startsWith('#')) continue;
              const parts = line.split('\t');
              if (parts.length >= 7) {
                const [domain, , path, secure, expires, name, value] = parts;
                cookies.push({
                  domain: domain.trim(),
                  path: path.trim(),
                  secure: secure.trim().toUpperCase() === 'TRUE',
                  expires: parseInt(expires) || undefined,
                  name: name.trim(),
                  value: value.trim()
                });
              }
            }

            (async () => {
              const browser = await puppeteer.launch({
                headless: true,               // 'true' is more compatible than 'new'
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--disable-blink-features=AutomationControlled',
                  '--window-size=1366,768'    // force window size
                ]
              });
              const page = await browser.newPage();
              await page.setUserAgent(userAgent);
              await page.setViewport({ width: 1366, height: 768 });

              // Optionally clear any existing cookies and set ours
              const client = await page.target().createCDPSession();
              await client.send('Network.clearBrowserCookies');
              if (cookies.length > 0) {
                await page.setCookie(...cookies);
                console.log('Injected ' + cookies.length + ' cookies');
              } else {
                console.warn('No cookies to inject – the page may block');
              }

              let pageLoaded = false;
              try {
                // First try to load the page with a generous timeout
                await page.goto(process.env.URL, {
                  waitUntil: 'domcontentloaded',
                  timeout: 120000
                });
                console.log('Page loaded (domcontentloaded).');
                pageLoaded = true;
              } catch (err) {
                console.log('Navigation error:', err.message);
                // If navigation fails, we'll still capture whatever is there after a wait
              }

              // Wait extra time for JS to render, Cloudflare challenge to fully complete
              console.log('Waiting ' + waitSeconds + ' seconds for content...');
              await wait(waitSeconds * 1000);

              // Log page title to see if we landed on something meaningful
              const title = await page.title().catch(() => 'unknown');
              console.log('Page title:', title);

              // If the body is empty, maybe the page didn't render – try refreshing once
              const bodyHTML = await page.content().catch(() => 'error');
              if (!pageLoaded || bodyHTML.length < 500 || title === '') {
                console.log('Page seems blank, attempting a refresh...');
                await page.reload({ waitUntil: 'domcontentloaded', timeout: 30000 }).catch(() => {});
                await wait(waitSeconds * 1000);
              }

              // Take full-page screenshot
              await page.screenshot({
                path: 'screenshots/' + process.env.FNAME,
                fullPage: true
              });
              console.log('Screenshot saved to screenshots/' + process.env.FNAME);
              await browser.close();
            })();
          "

      - name: Commit files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Screenshot of ${{ inputs.url }}" || echo "No changes"
          git push
