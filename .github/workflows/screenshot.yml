name: Web Screenshot (Stealth)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to capture'
        required: true
        type: string
      filename:
        description: 'Screenshot filename (without .png) – leave empty for timestamp'
        required: false
        type: string

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Take screenshot with stealth
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          mkdir -p screenshots

          if [ -n "$FILENAME" ]; then
            FNAME="$FILENAME.png"
          else
            FNAME="screenshot_$(date +%Y%m%d_%H%M%S).png"
          fi

          node -e "
            const puppeteer = require('puppeteer-extra');
            const StealthPlugin = require('puppeteer-extra-plugin-stealth');
            puppeteer.use(StealthPlugin());

            // A common, valid user-agent (Windows Chrome)
            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';

            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--disable-blink-features=AutomationControlled'
                ]
              });
              const page = await browser.newPage();
              await page.setUserAgent(userAgent);
              await page.setViewport({ width: 1366, height: 768 });
              await page.goto(process.env.URL, { waitUntil: 'networkidle2', timeout: 30000 });
              // Extra wait to let Cloudflare JS pass
              await page.waitForTimeout(5000);
              await page.screenshot({ path: 'screenshots/' + process.env.FNAME, fullPage: true });
              await browser.close();
              console.log('Screenshot saved to screenshots/' + process.env.FNAME);
            })();
          "

      - name: Commit and push screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Screenshot of ${{ inputs.url }}" || echo "No changes to commit"
          git push
