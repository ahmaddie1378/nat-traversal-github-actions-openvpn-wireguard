name: Web Screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to capture'
        required: true
        type: string
      filename:
        description: 'Screenshot filename (without .png) – leave empty for timestamp'
        required: false
        type: string

permissions:
  contents: write   # allow pushing commits

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Take screenshot
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          # Create screenshots directory if it doesn't exist
          mkdir -p screenshots

          # Determine output filename
          if [ -n "$FILENAME" ]; then
            FNAME="$FILENAME.png"
          else
            FNAME="screenshot_$(date +%Y%m%d_%H%M%S).png"
          fi

          # Run Puppeteer script
          node -e "
            const puppeteer = require('puppeteer');
            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 800 });
              await page.goto(process.env.URL, { waitUntil: 'networkidle2', timeout: 30000 });
              await page.screenshot({ path: 'screenshots/' + process.env.FNAME, fullPage: true });
              await browser.close();
              console.log('Screenshot saved to screenshots/' + process.env.FNAME);
            })();
          "

      - name: Commit and push screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Screenshot of ${{ inputs.url }}" || echo "No changes to commit"
          git push
