name: Screenshot with Cloudflare Bypass

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to capture'
        required: true
      filename:
        description: 'Screenshot filename (without .png) – optional'
        required: false
      wait_seconds:
        description: 'Extra wait after solving Cloudflare (default 30s)'
        required: false
        default: '30'

permissions:
  contents: write

jobs:
  bypass-and-screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer & stealth plugin
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Download and prepare FlareSolverr
        run: |
          wget -q https://github.com/FlareSolverr/FlareSolverr/releases/download/v3.3.25/flaresolverr_linux_x64.tar.gz
          mkdir -p flaresolverr_app
          tar -xzf flaresolverr_linux_x64.tar.gz -C flaresolverr_app
          chmod +x flaresolverr_app/flaresolverr
          echo "FlareSolverr extracted successfully"

      - name: Start FlareSolverr
        run: |
          ./flaresolverr_app/flaresolverr --log-level info &
          # Wait until the service responds
          for i in {1..30}; do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready"
              break
            fi
            sleep 2
          done

      - name: Solve Cloudflare and get cookies
        id: solve
        env:
          URL: ${{ inputs.url }}
          OUTPUT: 'cookies.json'
        run: |
          # Send request to FlareSolverr and extract cookies
          curl -s -X POST http://localhost:8191/v1 \
            -H 'Content-Type: application/json' \
            -d "{\"cmd\":\"request.get\",\"url\":\"$URL\",\"maxTimeout\":120000}" \
            -o response.json

          # Extract cookies from response (Netscape format)
          jq -r '.solution.cookies[] | "\(.domain)\t\(if .httpOnly then "TRUE" else "FALSE" end)\t\(.path)\t\(.secure)\t\(if .expiry then .expiry else 0 end)\t\(.name)\t\(.value)"' response.json > cookies.txt
          # Also save the final redirected URL (if any)
          jq -r '.solution.response.url // ""' response.json > final_url.txt
          echo "final_url=$(cat final_url.txt)" >> $GITHUB_OUTPUT

      - name: Take screenshot using solved cookies
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
        run: |
          mkdir -p screenshots
          if [ -n "$FILENAME" ]; then
            FNAME="$FILENAME.png"
          else
            FNAME="screenshot_$(date +%Y%m%d_%H%M%S).png"
          fi

          # Read cookies and inject into Puppeteer
          node -e "
            const puppeteer = require('puppeteer-extra');
            const StealthPlugin = require('puppeteer-extra-plugin-stealth');
            puppeteer.use(StealthPlugin());
            const fs = require('fs');
            const wait = ms => new Promise(r => setTimeout(r, ms));

            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            const waitSeconds = parseInt(process.env.WAIT_SECONDS) || 30;

            // Parse cookies from Netscape file created by FlareSolverr
            const cookiesRaw = fs.readFileSync('cookies.txt', 'utf-8').split('\n');
            const cookies = [];
            for (const line of cookiesRaw) {
              if (line.trim() === '' || line.startsWith('#')) continue;
              const parts = line.split('\t');
              if (parts.length >= 7) {
                const [domain, , path, secure, expires, name, value] = parts;
                cookies.push({
                  domain: domain.trim(),
                  path: path.trim(),
                  secure: secure.trim().toUpperCase() === 'TRUE',
                  expires: parseInt(expires) || undefined,
                  name: name.trim(),
                  value: value.trim()
                });
              }
            }

            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-blink-features=AutomationControlled']
              });
              const page = await browser.newPage();
              await page.setUserAgent(userAgent);
              await page.setViewport({ width: 1366, height: 768 });

              // Inject the Cloudflare clearance cookies before navigation
              if (cookies.length > 0) {
                await page.setCookie(...cookies);
                console.log('Injected ' + cookies.length + ' cookies');
              }

              try {
                await page.goto(process.env.URL, {
                  waitUntil: 'domcontentloaded',
                  timeout: 120000
                });
                console.log('Page loaded. Waiting ' + waitSeconds + ' seconds...');
                await wait(waitSeconds * 1000);
              } catch (err) {
                console.log('Error or timeout:', err.message);
                await wait(Math.max(waitSeconds * 500, 5000));
              }

              await page.screenshot({ path: 'screenshots/' + process.env.FNAME, fullPage: true });
              await browser.close();
              console.log('Screenshot saved');
            })();
          "

      - name: Commit files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Screenshot of ${{ inputs.url }}" || echo "No changes"
          git push
