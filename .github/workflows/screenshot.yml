name: Web Screenshot (Stealth + Wait Control)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to capture'
        required: true
        type: string
      filename:
        description: 'Screenshot filename (without .png) – leave empty for timestamp'
        required: false
        type: string
      wait_seconds:
        description: 'Extra wait time after page load (seconds) – default 30'
        required: false
        type: string
        default: '30'

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and stealth plugin
        run: |
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Fetch raw HTML (fallback)
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          mkdir -p screenshots
          if [ -n "$FILENAME" ]; then
            HTMLFILE="$FILENAME.html"
          else
            HTMLFILE="page_$(date +%Y%m%d_%H%M%S).html"
          fi
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL" > "screenshots/$HTMLFILE"
          echo "html_file=$HTMLFILE" >> $GITHUB_ENV

      - name: Take screenshot with adjustable wait
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
          WAIT_SECONDS: ${{ inputs.wait_seconds }}
        run: |
          mkdir -p screenshots

          if [ -n "$FILENAME" ]; then
            FNAME="$FILENAME.png"
          else
            FNAME="screenshot_$(date +%Y%m%d_%H%M%S).png"
          fi

          node -e "
            const puppeteer = require('puppeteer-extra');
            const StealthPlugin = require('puppeteer-extra-plugin-stealth');
            puppeteer.use(StealthPlugin());

            const userAgent = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
            const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

            // Use input wait seconds, fallback to 30
            const waitSeconds = parseInt(process.env.WAIT_SECONDS) || 30;

            (async () => {
              const browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox',
                  '--disable-setuid-sandbox',
                  '--disable-blink-features=AutomationControlled'
                ]
              });
              const page = await browser.newPage();
              await page.setUserAgent(userAgent);
              await page.setViewport({ width: 1366, height: 768 });

              try {
                // Longer navigation timeout: 2 minutes
                await page.goto(process.env.URL, {
                  waitUntil: 'domcontentloaded',
                  timeout: 120000
                });
                console.log('Page loaded. Waiting ' + waitSeconds + ' seconds for content...');
                await wait(waitSeconds * 1000);
              } catch (err) {
                console.log('Page load timed out or error:', err.message);
                console.log('Capturing current page content anyway...');
                // Wait half the requested time on error, at least 5 sec
                await wait(Math.max(waitSeconds * 500, 5000));
              }

              await page.screenshot({
                path: 'screenshots/' + process.env.FNAME,
                fullPage: true
              });
              await browser.close();
              console.log('Screenshot saved to screenshots/' + process.env.FNAME);
            })();
          "

      - name: Commit and push all files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git commit -m "Snapshot of ${{ inputs.url }}" || echo "No changes to commit"
          git push
