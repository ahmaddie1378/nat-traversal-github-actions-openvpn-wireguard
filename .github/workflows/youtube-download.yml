name: Download YouTube Video (Android + PO Token)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Max height (480, 720, etc.)'
        required: false
        default: '480'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          node -v || (curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs)

      - name: Set up bgutil-ytdlp-pot-provider server
        run: |
          # Clone the 1.3.1 release
          git clone --depth 1 --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server/

          # Install dependencies (dev dependencies include TypeScript)
          npm ci

          # Build the TypeScript source → produces dist/server.js
          npm run build

          # Verify the build
          if [ ! -f dist/server.js ]; then
            echo "ERROR: dist/server.js was not created"
            exit 1
          fi

          # Start the server in the background
          nohup node dist/server.js > server.log 2>&1 &
          echo $! > ../../server.pid

          # Wait for it to become ready (port 4416)
          for i in $(seq 1 20); do
            if curl -s http://localhost:4416/ > /dev/null 2>&1; then
              echo "PO token server is up!"
              break
            fi
            echo "Waiting for server... (attempt $i)"
            sleep 1
          done
          if ! curl -s http://localhost:4416/ > /dev/null 2>&1; then
            echo "Server failed to start. Logs:"
            cat server.log
            exit 1
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Generate tokens and download video
        run: |
          # Fetch a fresh token from the local server
          TOKEN_JSON=$(curl -s http://localhost:4416/token)
          echo "Server response: $TOKEN_JSON"

          VISITOR_DATA=$(echo "$TOKEN_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('visitorData',''))")
          PO_TOKEN=$(echo "$TOKEN_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('poToken',''))")

          echo "visitor_data: $VISITOR_DATA"
          echo "po_token: $PO_TOKEN"

          # Download using the Android client (bypasses bot checks) with PO token
          yt-dlp \
            --extractor-args "youtube:player_client=android;po_token=web+${PO_TOKEN};visitor_data=${VISITOR_DATA}" \
            -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Stop background server (cleanup)
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: Commit and push video
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.mkv *.webm 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Downloaded video: ${{ github.event.inputs.url }}"
            git push
          fi
