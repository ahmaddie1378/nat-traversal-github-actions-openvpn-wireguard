name: Download YouTube Video (Plugin Method)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Max height (480, 720, etc.)'
        required: false
        default: '480'

permissions:
  contents: write      # needed to push the video back

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true           # enable if you use Git LFS
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # Node.js is already present on ubuntu-latest, just confirm
          node -v

      - name: Set up bgutil-ytdlp-pot-provider server
        run: |
          # Clone a specific stable release
          git clone --single-branch --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git
          cd bgutil-ytdlp-pot-provider/server/
          npm ci
          npx tsc

          # Start the server in the background
          nohup node dist/server.js > server.log 2>&1 &
          echo $! > ../../server.pid

          # Wait until it's ready to accept connections (port 4416)
          for i in $(seq 1 15); do
            if curl -s http://localhost:4416/ > /dev/null; then
              echo "Server is up!"
              break
            fi
            echo "Waiting for server (attempt $i)..."
            sleep 1
          done

      - name: Install yt-dlp and the plugin
        run: |
          python3 -m pip install -U yt-dlp
          python3 -m pip install -U bgutil-ytdlp-pot-provider

      - name: Download video
        run: |
          # The plugin automatically contacts the local server for tokens.
          # You can explicitly request the 'web' client to ensure PO token usage.
          yt-dlp \
            --extractor-args "youtube:player_client=web,default" \
            -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"

      - name: Stop background server (cleanup)
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi

      - name: Commit and push video
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.mkv *.webm 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Downloaded video: ${{ github.event.inputs.url }}"
            git push
          fi
