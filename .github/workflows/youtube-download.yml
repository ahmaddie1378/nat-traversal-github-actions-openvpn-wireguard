name: Download YouTube Video (Piped, Robust)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_name:
        description: 'Output filename (without extension)'
        required: false
        default: 'video'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg curl jq

      - name: Extract video ID
        id: extract-id
        run: |
          URL="${{ github.event.inputs.video_url }}"
          ID=$(echo "$URL" | grep -oP '(?<=v=|\/embed\/|\/v\/|youtu\.be\/)[a-zA-Z0-9_-]{11}' | head -1)
          if [ -z "$ID" ]; then
            echo "Could not parse video ID from: $URL"
            exit 1
          fi
          echo "video_id=$ID" >> $GITHUB_OUTPUT

      - name: Fetch & Download from Piped API
        id: fetch
        run: |
          ID="${{ steps.extract-id.outputs.video_id }}"
          # Extensive list of Piped instances (add more if needed)
          INSTANCES=(
            "https://pipedapi.kavin.rocks"
            "https://pipedapi.adminforge.de"
            "https://api.piped.yt"
            "https://pipedapi.leptons.xyz"
            "https://piped-api.privacy.com.de"
            "https://pipedapi.drgns.space"
            "https://pipedapi.syncpundit.io"
            "https://piped.mha.fi"
            "https://pipedapi.tokhmi.xyz"
            "https://pipedapi.garudalinux.org"
            "https://pipedapi.rivo.lol"
            "https://pipedapi.aeong.one"
            "https://pipedapi-libre.kavin.rocks"
          )

          WORKING_INSTANCE=""
          RESPONSE=""
          for INST in "${INSTANCES[@]}"; do
            echo "Trying: $INST"
            RESPONSE=$(curl -sS --max-time 20 "$INST/streams/$ID" 2>/dev/null || true)

            # Skip empty responses
            [ -z "$RESPONSE" ] && echo "  -> empty response" && continue

            # Check if it looks like JSON
            if ! echo "$RESPONSE" | head -1 | grep -qE '^[{\[]'; then
              echo "  -> not JSON (likely HTML)"
              continue
            fi

            # Validate JSON and check for required fields
            if echo "$RESPONSE" | jq -e '.title' >/dev/null 2>&1; then
              WORKING_INSTANCE="$INST"
              echo "  ✓ success"
              break
            else
              echo "  -> JSON but missing title (error response?)"
            fi
          done

          if [ -z "$WORKING_INSTANCE" ]; then
            echo "❌ No working Piped instance found."
            exit 1
          fi

          # Extract URLs
          VIDEO_URL=$(echo "$RESPONSE" | jq -r '
            .videoStreams
            | map(select(.quality == "720p" or .quality == "1080p" or .quality == "medium"))
            | sort_by(.bitrate | tonumber) | last | .url // empty
          ')
          AUDIO_URL=$(echo "$RESPONSE" | jq -r '
            .audioStreams
            | map(select(.quality == "128 kbps" or .quality == "medium"))
            | sort_by(.bitrate | tonumber) | last | .url // empty
          ')

          if [ -z "$VIDEO_URL" ] && [ -z "$AUDIO_URL" ]; then
            echo "❌ No downloadable streams found."
            exit 1
          fi

          echo "video_url=$VIDEO_URL" >> $GITHUB_OUTPUT
          echo "audio_url=$AUDIO_URL" >> $GITHUB_OUTPUT
          [ -n "$VIDEO_URL" ] && echo "has_video=true" >> $GITHUB_OUTPUT || echo "has_video=false" >> $GITHUB_OUTPUT
          [ -n "$AUDIO_URL" ] && echo "has_audio=true" >> $GITHUB_OUTPUT || echo "has_audio=false" >> $GITHUB_OUTPUT

          TITLE=$(echo "$RESPONSE" | jq -r '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "Video: $TITLE"

      - name: Download and merge
        run: |
          mkdir -p videos
          cd videos
          OUTPUT_NAME="${{ github.event.inputs.output_name }}"

          if [ "${{ steps.fetch.outputs.has_video }}" = "true" ] && [ "${{ steps.fetch.outputs.has_audio }}" = "true" ]; then
            echo "Downloading video and audio..."
            curl -L -o video_temp.mp4 "${{ steps.fetch.outputs.video_url }}"
            curl -L -o audio_temp.m4a "${{ steps.fetch.outputs.audio_url }}"
            ffmpeg -i video_temp.mp4 -i audio_temp.m4a -c copy "${OUTPUT_NAME}.mp4"
            rm video_temp.mp4 audio_temp.m4a
          elif [ "${{ steps.fetch.outputs.has_video }}" = "true" ]; then
            echo "Downloading video-only stream..."
            curl -L -o "${OUTPUT_NAME}.mp4" "${{ steps.fetch.outputs.video_url }}"
          else
            echo "Downloading audio-only (very unusual)..."
            curl -L -o "${OUTPUT_NAME}.m4a" "${{ steps.fetch.outputs.audio_url }}"
          fi
          echo "✅ Downloaded."

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git add videos/
          git diff --cached --quiet || (
            git commit -m "Add video via Piped: ${{ steps.fetch.outputs.title }}"
            git push origin HEAD
          )
