name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Max height (e.g. 480)'
        default: '480'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python tools
        run: pip install -U yt-dlp po-token-generator

      - name: Generate PO token
        id: potoken
        run: |
          echo "Generating PO token..."
          TOKEN=$(po-token-generator)
          echo "PO_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Download video
        run: |
          yt-dlp \
            -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            --extractor-args "youtube:po_token=web+${PO_TOKEN}" \
            "${{ github.event.inputs.url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.mp4 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "Downloaded video"
          git push
