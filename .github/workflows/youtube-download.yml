name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_name:
        description: 'Output filename (without extension)'
        required: false
        default: 'video'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true

      - name: Install Deno (JavaScript runtime for yt-dlp)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Write YouTube cookies from secret
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          # Make sure the file was created and is not empty
          wc -c cookies.txt

      - name: Download video
        run: |
          mkdir -p videos
          cd videos
          yt-dlp \
            --cookies ../cookies.txt \
            --output "${{ github.event.inputs.output_name }}.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            "${{ github.event.inputs.video_url }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Track video files with LFS
        run: |
          git lfs track "*.mp4" "*.webm" "*.mkv"
          git add .gitattributes

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git add videos/
          git diff --cached --quiet || (
            git commit -m "Add video from ${{ github.event.inputs.video_url }}"
            git push origin HEAD
          )
