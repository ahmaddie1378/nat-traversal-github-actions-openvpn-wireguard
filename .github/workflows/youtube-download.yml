name: Download YouTube Video (Cookies + Android Client)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_name:
        description: 'Output filename (without extension)'
        required: false
        default: 'video'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs python3 python3-pip
          pip3 install yt-dlp

      - name: Verify Node.js
        run: node --version

      - name: Write cookies file from secret
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          echo "$YT_COOKIES" > cookies.txt
          echo "Cookies line count:"
          wc -l cookies.txt
          head -1 cookies.txt
          if grep -q "youtube.com" cookies.txt; then
            echo "✔ cookies.txt valid"
          else
            echo "✘ cookies.txt missing youtube.com – update YT_COOKIES secret!"
            exit 1
          fi

      - name: Download video (Android client + cookies)
        run: |
          mkdir -p videos
          cd videos
          yt-dlp \
            --cookies ../cookies.txt \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android" \
            --output "${{ github.event.inputs.output_name }}.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            "${{ github.event.inputs.video_url }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Track video files with LFS
        run: |
          git lfs track "*.mp4" "*.webm" "*.mkv"
          git add .gitattributes

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git add videos/
          git diff --cached --quiet || (
            git commit -m "Add video: ${{ github.event.inputs.video_url }}"
            git push origin HEAD
          )
