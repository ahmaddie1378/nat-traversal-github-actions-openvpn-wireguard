name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Max height (e.g. 480)'
        required: false
        default: '480'

permissions:
  contents: write   # to push the downloaded file

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true   # pulls LFS objects if any; harmless if not used

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python tools
        run: |
          pip install -U yt-dlp po-token-generator

      - name: Generate PO token
        id: potoken
        run: |
          echo "Generating PO token..."
          TOKEN=$(po-token-generator)
          echo "PO_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Download video
        run: |
          yt-dlp \
            -f "bestvideo[height<=${{ github.event.inputs.quality }}]+bestaudio/best[height<=${{ github.event.inputs.quality }}]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            --extractor-args "youtube:po_token=web+${PO_TOKEN}" \
            "${{ github.event.inputs.url }}"

      - name: Commit and push video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.mp4 *.mkv *.webm 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new video to commit"
          else
            git commit -m "Downloaded: ${{ github.event.inputs.url }}"
            git push
          fi
