name: Download YouTube Video (Cookie Header)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_name:
        description: 'Output filename (without extension)'
        required: false
        default: 'video'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs python3 python3-pip
          pip3 install yt-dlp

      - name: Generate cookies.txt from cookie header
        env:
          COOKIE_RAW: ${{ secrets.YT_COOKIE_HEADER }}
        run: |
          # Remove any leading "cookie:" or "Cookie:" prefix and trim whitespace
          CLEAN=$(echo "$COOKIE_RAW" | sed -E 's/^cookie:\s*//i')
          echo "# Netscape HTTP Cookie File" > cookies.txt
          echo "# This is a generated file!  Do not edit." >> cookies.txt
          echo "" >> cookies.txt
          echo "$CLEAN" | tr -d '\n' | awk '{
            split($0, pairs, "; ");
            for (i in pairs) {
              if (pairs[i] ~ /=/) {
                split(pairs[i], kv, "=");
                name = kv[1];
                value = substr(pairs[i], length(name)+2);
                printf ".youtube.com\tTRUE\t/\tTRUE\t0\t%s\t%s\n", name, value
              }
            }
          }' >> cookies.txt
          echo "Generated cookies.txt with $(wc -l < cookies.txt) lines"
          head -5 cookies.txt

      - name: Download video (Android client + cookies)
        run: |
          mkdir -p videos
          cd videos
          yt-dlp \
            --cookies ../cookies.txt \
            --js-runtimes node \
            --extractor-args "youtube:player_client=android" \
            --output "${{ github.event.inputs.output_name }}.%(ext)s" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            "${{ github.event.inputs.video_url }}"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Track video files with LFS
        run: |
          git lfs track "*.mp4" "*.webm" "*.mkv"
          git add .gitattributes

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git add videos/
          git diff --cached --quiet || (
            git commit -m "Add video: ${{ github.event.inputs.video_url }}"
            git push origin HEAD
          )
