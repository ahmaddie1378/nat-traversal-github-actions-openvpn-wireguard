name: Download YouTube Video (Cobalt Strategy)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq
      - name: Request download from Cobalt API
        id: cobalt
        run: |
          RESPONSE=$(curl -sS --max-time 30 -X POST "https://co.wuk.sh/" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"url": "${{ github.event.inputs.video_url }}", "videoQuality": "720p", "downloadMode": "auto"}')
          echo "Raw response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
          if [ "$STATUS" != "redirect" ] && [ "$STATUS" != "tunnel" ]; then
            echo "Cobalt failed with status: $STATUS"
            exit 1
          fi
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Failed to get download URL."
            exit 1
          fi
          echo "Download URL: $DOWNLOAD_URL"
          mkdir -p videos
          curl -L -o videos/video.mp4 "$DOWNLOAD_URL"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git diff --cached --quiet || (git commit -m "Add video via Cobalt" && git push origin HEAD)
