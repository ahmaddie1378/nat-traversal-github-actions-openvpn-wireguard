name: Download YouTube Video (pytubefix Strategy)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytubefix
        run: pip install pytubefix
      - name: Download video
        run: |
          python -c "
          from pytubefix import YouTube
          url = '${{ github.event.inputs.video_url }}'
          yt = YouTube(url)
          print(f'Downloading: {yt.title}')
          stream = yt.streams.get_highest_resolution()
          stream.download(output_path='videos')
          "
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git diff --cached --quiet || (git commit -m "Add video via pytubefix" && git push origin HEAD)
