name: Download via Cobalt (DNS‑Proof)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y curl jq

      - name: Resolve Cobalt API IP via Google DNS
        id: resolve
        run: |
          # Query Google DNS over HTTPS for api.cobalt.tools A records
          DNS_RESPONSE=$(curl -s "https://dns.google/resolve?name=api.cobalt.tools&type=A")
          IP=$(echo "$DNS_RESPONSE" | jq -r '.Answer[0].data // empty')
          if [ -z "$IP" ]; then
            echo "Failed to resolve api.cobalt.tools via Google DNS."
            exit 1
          fi
          echo "Resolved IP: $IP"
          echo "api_ip=$IP" >> $GITHUB_OUTPUT

      - name: Request download from Cobalt (using resolved IP)
        id: cobalt
        run: |
          IP="${{ steps.resolve.outputs.api_ip }}"
          # Use --resolve to bind the hostname to IP without system DNS
          RESPONSE=$(curl -sS --max-time 60 \
            --resolve "api.cobalt.tools:443:$IP" \
            -X POST "https://api.cobalt.tools/" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${{ github.event.inputs.video_url }}\", \"videoQuality\": \"720p\", \"downloadMode\": \"auto\"}")

          STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
          if [ "$STATUS" != "redirect" ] && [ "$STATUS" != "tunnel" ]; then
            echo "Cobalt status: $STATUS"
            echo "Response: $RESPONSE"
            exit 1
          fi

          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.url')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "No download URL in response."
            exit 1
          fi

          echo "Download URL obtained."
          mkdir -p videos
          curl -L -o videos/video.mp4 "$DOWNLOAD_URL"

      - name: Configure Git and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git diff --cached --quiet || (git commit -m "Add video via Cobalt" && git push origin HEAD)
