name: SSH Reverse Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Establish reverse SSH tunnel via Serveo
        run: |
          sudo apt update && sudo apt install -y autossh
          # This forwards GitHub's port 8888 to your local SSH server on port 22
          autossh -M 0 -o "StrictHostKeyChecking=no" -o "ServerAliveInterval 60" -R 80:localhost:22 serveo.net &
          sleep 10
          echo "Tunnel established. SSH to your local machine via: ssh -p 80 user@serveo.net"
          sleep 21000
