name: Manual OpenVPN Server

on:
  workflow_dispatch:
    inputs:
      public_ip:
        description: 'Your public IP address'
        required: true
        type: string
      local_port:
        description: 'Local UDP port (20000-30000)'
        required: true
        type: string
        default: '25000'

jobs:
  openvpn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup OpenVPN server
        run: |
          # Update and install OpenVPN and easy-rsa
          sudo apt update
          sudo apt install -y openvpn easy-rsa iptables

          # Setup PKI
          make-cadir ~/openvpn-ca
          cd ~/openvpn-ca
          ./easyrsa init-pki
          echo -e "server\n" | ./easyrsa build-ca nopass
          ./easyrsa gen-req server nopass
          ./easyrsa sign-req server server
          ./easyrsa gen-dh
          openvpn --genkey --secret ta.key

          # Create server config
          sudo mkdir -p /etc/openvpn/server
          sudo cp pki/ca.crt pki/issued/server.crt pki/private/server.key pki/dh.pem ta.key /etc/openvpn/server

          cat | sudo tee /etc/openvpn/server/server.conf << EOF
          port 1194
          proto udp
          dev tun
          ca ca.crt
          cert server.crt
          key server.key
          dh dh.pem
          tls-auth ta.key 0
          server 10.8.0.0 255.255.255.0
          push "redirect-gateway def1 bypass-dhcp"
          push "dhcp-option DNS 8.8.8.8"
          push "dhcp-option DNS 1.1.1.1"
          keepalive 10 120
          cipher AES-256-CBC
          user nobody
          group nogroup
          persist-key
          persist-tun
          status openvpn-status.log
          verb 3
          explicit-exit-notify 1
          EOF

          # Enable IP forwarding and NAT
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE

          # Start OpenVPN server
          sudo systemctl start openvpn-server@server
          sudo systemctl enable openvpn-server@server

      - name: Generate client config for NAT traversal
        run: |
          cd ~/openvpn-ca
          ./easyrsa gen-req client1 nopass
          ./easyrsa sign-req client client1

          # Build client.ovpn with the user's provided IP and port
          PUBLIC_IP="${{ github.event.inputs.public_ip }}"
          LOCAL_PORT="${{ github.event.inputs.local_port }}"

          cat > client.ovpn << EOF
          client
          dev tun
          proto udp
          remote $PUBLIC_IP $LOCAL_PORT
          resolv-retry infinite
          nobind
          persist-key
          persist-tun
          remote-cert-tls server
          cipher AES-256-CBC
          verb 3
          <ca>
          $(cat ~/openvpn-ca/pki/ca.crt)
          </ca>
          <cert>
          $(cat ~/openvpn-ca/pki/issued/client1.crt)
          </cert>
          <key>
          $(cat ~/openvpn-ca/pki/private/client1.key)
          </key>
          <tls-auth>
          $(cat ~/openvpn-ca/ta.key)
          </tls-auth>
          key-direction 1
          EOF

          echo "=============================================="
          echo "CLIENT CONFIGURATION (Save as client.ovpn):"
          echo "=============================================="
          cat client.ovpn
          echo "=============================================="

      - name: Keep alive and punch NAT
        run: |
          # Keep the runner alive for 5h50m
          # Also send keepalive packets back to client's public IP to help hole punching
          # (This is optional but can assist symmetric NATs)
          sleep 21000
