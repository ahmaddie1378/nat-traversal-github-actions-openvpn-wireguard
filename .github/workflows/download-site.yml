name: Download Website as ZIP

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to mirror (e.g., https://example.com)'
        required: true
      max_depth:
        description: 'Max crawl depth (default 1)'
        required: false
        default: '1'
      folder_name:
        description: 'Folder name for the site (leave empty to use domain)'
        required: false

permissions:
  contents: write

jobs:
  mirror-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mirror website with wget
        env:
          URL: ${{ inputs.url }}
          DEPTH: ${{ inputs.max_depth }}
          FOLDER: ${{ inputs.folder_name }}
        run: |
          # Extract domain if no folder name provided
          if [ -z "$FOLDER" ]; then
            DOMAIN=$(echo "$URL" | awk -F/ '{print $3}')
            FOLDER="${DOMAIN:-site}"
          fi

          echo "Mirroring $URL into folder $FOLDER (depth=$DEPTH)"

          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --level="$DEPTH" \
            --wait=1 \
            --random-wait \
            --no-verbose \
            --directory-prefix="$FOLDER" \
            --no-host-directories \
            "$URL"

          # Move files if wget created a subdirectory (since we used --no-host-directories, they go straight into $FOLDER)
          echo "Files downloaded. Listing:"
          ls -la "$FOLDER"

      - name: Create ZIP archive
        run: |
          FOLDER="${{ inputs.folder_name }}"
          if [ -z "$FOLDER" ]; then
            DOMAIN=$(echo "${{ inputs.url }}" | awk -F/ '{print $3}')
            FOLDER="${DOMAIN:-site}"
          fi
          ZIP_NAME="${FOLDER}.zip"
          zip -r "$ZIP_NAME" "$FOLDER"
          echo "Created $ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV

      - name: Commit ZIP to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Move the ZIP to a permanent folder (e.g., archives/)
          mkdir -p archives
          mv "${{ env.zip_name }}" archives/
          git add archives/
          git commit -m "Downloaded site: ${{ inputs.url }} -> archives/${{ env.zip_name }}" || echo "No changes to commit"
          git push
