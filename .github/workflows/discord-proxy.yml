name: Discord Reverse TCP Tunnel

on:
  workflow_dispatch:
    inputs:
      public_ip:
        description: 'Your public IP'
        required: true

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Install and configure SSH server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo tee /etc/ssh/sshd_config.d/discord.conf << EOF
          Port 22
          PermitRootLogin yes
          PasswordAuthentication yes
          KbdInteractiveAuthentication yes
          EOF
          echo "root:tunnel" | sudo chpasswd
          sudo systemctl restart ssh

      - name: Start reverse TCP connector
        run: |
          cat > connect.py << 'EOF'
          import socket, time, sys
          target_host = sys.argv[1]
          target_port = int(sys.argv[2])
          while True:
              try:
                  client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  client.connect((target_host, target_port))
                  server = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  server.connect(('127.0.0.1', 22))
                  import threading
                  def pipe(src, dst):
                      while True:
                          data = src.recv(4096)
                          if not data: break
                          dst.sendall(data)
                  threading.Thread(target=pipe, args=(client, server), daemon=True).start()
                  threading.Thread(target=pipe, args=(server, client), daemon=True).start()
              except Exception as e:
                  print("Retrying in 10s:", e)
                  time.sleep(10)
          EOF
          python3 connect.py ${{ inputs.public_ip }} 443 &
          echo "Connector started."
          sleep 21000
