name: Discord SOCKS5 Proxy (Key-Based)

on:
  workflow_dispatch:
    inputs:
      public_ip:
        description: 'Your public IP'
        required: true
      ssh_port:
        description: 'SSH port on your machine (e.g., 2222)'
        required: true
        default: '2222'
      local_username:
        description: 'Your local username (e.g., ahmad)'
        required: true
      local_public_key:
        description: 'Your public SSH key (cat ~/.ssh/id_ed25519.pub)'
        required: true

jobs:
  reverse-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare runner SSH and add user key
        run: |
          sudo apt update
          sudo apt install -y openssh-server openssh-client

          # Allow root login and password authentication (not needed but safe)
          echo "PermitRootLogin yes" | sudo tee /etc/ssh/sshd_config.d/root.conf
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config.d/root.conf
          sudo systemctl restart ssh

          # Set root password just in case (optional)
          echo 'root:tunnel' | sudo chpasswd

          # Add YOUR public key to root's authorized_keys
          sudo mkdir -p /root/.ssh
          echo "${{ github.event.inputs.local_public_key }}" | sudo tee -a /root/.ssh/authorized_keys
          sudo chmod 600 /root/.ssh/authorized_keys
          sudo chown -R root:root /root/.ssh

      - name: Set up SSH key for reverse tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Start reverse tunnel
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 -o ExitOnForwardFailure=yes \
              -N -R 2222:localhost:22 \
              -p ${{ github.event.inputs.ssh_port }} \
              ${{ github.event.inputs.local_username }}@${{ github.event.inputs.public_ip }} &

          sleep 5
          if pgrep -f "ssh.*-R.*2222" > /dev/null; then
            echo "Reverse tunnel established."
          else
            echo "ERROR: Tunnel failed."
          fi
          sleep 21000
