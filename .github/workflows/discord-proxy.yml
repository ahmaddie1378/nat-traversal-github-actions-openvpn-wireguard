name: Discord SOCKS5 Proxy (Direct)

on:
  workflow_dispatch:

jobs:
  ssh-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH server on runner
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

          # Configure SSH server
          sudo tee /etc/ssh/sshd_config.d/direct.conf << EOF
          Port 443
          PermitRootLogin yes
          PasswordAuthentication yes
          KbdInteractiveAuthentication yes
          EOF

          # Set a temporary root password (change 'discordproxy2026' to something you like)
          echo "root:discordproxy2026" | sudo chpasswd

          sudo systemctl restart sshd

      - name: Get runner public IP
        run: |
          RUNNER_IP=$(curl -s ifconfig.me || curl -s ipinfo.io/ip || curl -s icanhazip.com)
          echo "=============================================="
          echo " RUNNER IS READY"
          echo " Use this command on your local machine:"
          echo "=============================================="
          echo "ssh -o StrictHostKeyChecking=no -D 1080 -p 443 root@${RUNNER_IP}"
          echo "Password: discordproxy2026"
          echo "=============================================="

      - name: Keep alive for 6 hours
        run: sleep 21600
