name: Discord SOCKS5 Proxy (Direct)

on:
  workflow_dispatch:

jobs:
  ssh-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH server on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl

          # Write SSH configuration
          sudo tee /etc/ssh/sshd_config.d/direct.conf << EOF
          Port 443
          PermitRootLogin yes
          PasswordAuthentication yes
          KbdInteractiveAuthentication yes
          EOF

          # Set a temporary root password (change 'discordproxy2026' if you like)
          echo "root:discordproxy2026" | sudo chpasswd

      - name: Restart SSH and get runner IP
        run: |
          # IMPORTANT: Ubuntu uses 'ssh' not 'sshd'
          sudo systemctl restart ssh
          sudo systemctl status ssh --no-pager --lines=0

          # Wait a moment for the service to settle
          sleep 2

          # Get the runner's public IP (try multiple services)
          RUNNER_IP=$(curl -s --max-time 5 ifconfig.me || curl -s --max-time 5 ipinfo.io/ip || curl -s --max-time 5 icanhazip.com)
          if [ -z "$RUNNER_IP" ]; then
            echo "ERROR: Could not determine runner IP. Check network."
            exit 1
          fi

          echo ""
          echo "=============================================="
          echo " RUNNER IS READY"
          echo " Use this command on your local machine:"
          echo "=============================================="
          echo "ssh -o StrictHostKeyChecking=no -D 1080 -p 443 root@${RUNNER_IP}"
          echo "Password: discordproxy2026"
          echo "=============================================="

      - name: Keep alive for 6 hours
        run: sleep 21600
