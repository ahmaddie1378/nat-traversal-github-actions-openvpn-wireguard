name: IP Reflector

on:
  workflow_dispatch:

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner’s own IPs (DNS & Cloudflare)
        run: |
          echo "Runner IPv4:"
          dig +short myip.opendns.com @resolver1.opendns.com || echo "DNS failed"
          echo "Cloudflare trace:"
          curl -s https://cloudflare.com/cdn-cgi/trace | grep ip || echo "CF failed"

      - name: Start TCP listener and log connecting IP
        run: |
          # Listen on port 9999, accept one connection, print the remote IP
          echo "Listening on port 9999 – connect to the runner IP above with:"
          echo "nc <runner_ip> 9999"
          # Using bash TCP
          bash -c '
            exec 3<>/dev/tcp/0.0.0.0/9999
            read -r line <&3
            echo "Connection from: $line"
          ' || echo "No connection received within timeout"
          # Keep alive for 5 minutes to give you time to connect
          sleep 300
