name: IP Echo Server

on:
  workflow_dispatch:

jobs:
  echo-ip:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner’s own IP (multiple methods)
        run: |
          echo "Runner IP (DNS):"
          dig +short myip.opendns.com @resolver1.opendns.com || echo "DNS failed"
          echo "Runner IP (Cloudflare):"
          curl -s https://cloudflare.com/cdn-cgi/trace | grep ip || echo "CF failed"

      - name: Start HTTP server that returns client IP
        run: |
          cat > server.py << 'EOF'
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import socket

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  client_ip = self.client_address[0]
                  self.send_response(200)
                  self.send_header('Content-type', 'text/plain')
                  self.end_headers()
                  self.wfile.write(client_ip.encode())

          server = HTTPServer(('0.0.0.0', 9999), Handler)
          print(f"Listening on port 9999... Access me at http://<runner_ip>:9999/")
          server.serve_forever()
          EOF
          python3 server.py &
          sleep 5
          echo "Server is ready. Connect using curl from your local machine."
          # Keep alive for 10 minutes
          sleep 600
