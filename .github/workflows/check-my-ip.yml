name: IP Reflector

on:
  workflow_dispatch:

jobs:
  reflect:
    runs-on: ubuntu-latest
    steps:
      - name: Show runner’s own public IP (fallback methods)
        run: |
          echo "Attempting to get runner's IP via DNS..."
          dig +short myip.opendns.com @resolver1.opendns.com || echo "DNS method failed"
          echo "Attempting Cloudflare trace..."
          curl -s https://cloudflare.com/cdn-cgi/trace | grep ip || echo "Cloudflare trace failed"
          echo "Attempting ifconfig.io..."
          curl -s https://ifconfig.io 2>/dev/null || echo "ifconfig.io failed"
          echo "Attempting ip.sb..."
          curl -s https://api.ip.sb/ip 2>/dev/null || echo "ip.sb failed"

      - name: Listen for a connection and log the remote IP
        run: |
          PORT=9999
          echo "Listening on port $PORT..."
          echo "Connect to the runner IP (shown above) using: nc <runner_ip> $PORT"
          # Use nc to listen for a single connection, then print the remote IP
          # -l: listen, -p: port, -v: verbose (shows connection info)
          timeout 300 nc -l -p $PORT -v 2>&1 | tee /tmp/connection.log &
          # Allow time for the user to connect
          sleep 5
          # The nc output will show "Connection from x.x.x.x port ..." in stderr
          # We capture it and display
          echo "---"
          echo "Remote IP from connection log:"
          cat /tmp/connection.log | grep "Connection from" || echo "No connection yet – waiting up to 5 minutes..."
          sleep 295
